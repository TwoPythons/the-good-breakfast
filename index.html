<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Toast</title>
</head>

<body>
<header>

    <nav>
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT US</a>
    <a href="menu.html">MENU</a>
    <a href="mailto:info@breakfast.com">CONTACT US</a>
    </nav>

</header>

<main> 
    <h1>The good breakfast</h1>

    <p>Here you will find all sorts of delicious treats</p>

    <figure>
        <img src="https://i.postimg.cc/htxcJGB6/ZKkCecn.jpg" alt="Urban Toast Delicious Breakfast">
        <figcaption>powered by biscuit.</figcaption>
    </figure>

<section class="booking">
    <h2>Reservas Aquí</h2>
    
    <form action="#" method="POST">

        <div>
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" placeholder="Tu nombre completo">
        </div>

        <div>
            <p>Tipo de reserva:</p>
            <label for="snack">
            <input type="checkbox" id="snack" name="meal" value="snack">Snack</label>

            <label for="breakfast">
            <input type="checkbox" id="breakfast" name="meal" value="breakfast">Breakfast</label> 
        </div>

        <br>

        <div>
            <label for="people">Personas:</label>
            <select id="people" name="people">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
            </select>
        </div>

        <br>
        <button type="submit" class="btn">Enviar Reserva</button>
    </form>
</section>


</main>

    <footer>
        <p>From the oven with love</p>
        
        <a href="mailto:info@breakfast.com">Contact Us</a>

        <section class="horario">

        <h3>Horario de Apertura:</h3>

        <p>L-V: <time datetime="08:00">8:00</time> - <time datetime="17:00">17:00</time></p>
        <p>S: <time datetime="10:00">10:00</time> - <time datetime="17:00">17:00</time></p>
        <p>Domingos: <strong>Cerrado</strong></p>

        </section>

    </footer>

</body>
</html>
